<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Playlist</title>

    <link rel="icon" href="image/music.png" type="image/png">
    <link rel="stylesheet" href="css/body.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script type="module" src="js/main.js" defer></script>
</head>
<body id="body">
    <nav class="navbar">
        <div class="navbar-left">
            <button type="button" id="themeButton" class="theme-button"></button>
        </div>

        <div class="navbar-right">
            <input type="search" id="searchTrackBar" placeholder="..." data-search class="search-track-bar" autocomplete="off">

            <button type="button" class="upload-track-button">
                <label id="upload-track-label" for="upload-track" class="upload-track">
                    <input type="file" id="upload-track" name="upload-track" multiple accept=".mp3, .mp4">

                    <div id="uploadTrackButton"></div>
                </label>
                
                <audio id="audioFromTrack" preload="metadata"></audio>
            </button>
        </div>
    </nav>

    <div class="sidebar">
        <div class="user-controls-layout">
            <div class="drag-handle"></div>

            <div class="track-name-container">
                <div class="track-name-wrapper" id="trackNameWrapper">
                    <p>Loading Previous Track..</p>
                </div>
            </div>

            <div class="control-button-wrapper">
                <button type="button" id="playPreviousTrackButton" class="control-previous-button">«</button>

                <button type="button" id="playPauseTrackButton" class="play-pause-button">▶︎</button>

                <button type="button" id="playNextTrackButton" class="control-next-button">»</button>
            </div>

            <input type="range" id="volumeBar" min="0" max="1" step="0.01">

            <input type="range" id="seekBar" value="0" step="0.01">
        </div>

        <div id="userPlaylist" class="user-playlist-layout"></div>
    </div>
</body>
</html>
