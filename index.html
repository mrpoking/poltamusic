<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Playlist</title>
    <link rel="stylesheet" href="body.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="local.js" defer></script>
</head>
<body>

    <nav class="navbar">

        <div class="navbar-left">
            <input type="search" id="musicSearch" placeholder="..." data-search class="searchmusic-bar" autocomplete="off">
        </div>

        <div class="navbar-right">
            <button type="button" class="theme-button" id="themeButton">🌙</button>
            <button type="button" class="addmusic-button">
                <input type="file" id="file-input" name="file-input" multiple>
                <label id="file-input-label" for="file-input" class="file-input">📁</label>
                <audio id="audio" preload="metadata"></audio>
            </button>
        </div>

    </nav>

    <div class="sidebar">

        <div class="user-controls">
            <button id="playPauseButton" class="playpause-button">▶︎</button>
            <input type="range" id="volumeBar" min="0" max="2" step="0.01">
            <input type="range" id="seekBar" value="0" step="0.01">
        </div>

        <div id="playList" class="user-playlist"></div>

    </div>

</body>
</html>
